<script>
        // PASTE YOUR MAKE.COM WEBHOOK URL HERE
        const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/y4h1w2x2qan01vtuh32udd6ekp8eg7ro";

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            document.getElementById('status').innerText = "Speech recognition not supported on this browser.";
        }

        const recognition = new SpeechRecognition();
        
        // CRITICAL FIXES FOR MANUALLY CONTROLLED SPEECH
        recognition.continuous = true; // Prevents the browser from auto-stopping on pauses
        recognition.lang = 'en-US';
        recognition.interimResults = false;

        let isListening = false;
        let finalTranscript = ''; // Stores text across pauses
        const btn = document.getElementById('mic-btn');
        const statusText = document.getElementById('status');

        function toggleListening() {
            if (isListening) {
                // Manually stopping triggers transmission
                recognition.stop();
            } else {
                finalTranscript = ''; // Reset for new entry
                recognition.start();
            }
        }

        recognition.onstart = () => {
            isListening = true;
            btn.classList.add('listening');
            btn.innerText = "TAP TO SEND"; // Clear instruction change
            statusText.innerText = "Listening... Tap button again when finished speaking.";
        };

        recognition.onresult = (event) => {
            // Append incoming speech segments continuously
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                }
            }
        };

        recognition.onend = () => {
            isListening = false;
            btn.classList.remove('listening');
            btn.innerText = "TAP TO SPEAK";

            if (!finalTranscript.trim()) {
                statusText.innerText = "No speech detected. Ready, sir.";
                return;
            }

            statusText.innerText = `Transmitting: "${finalTranscript.trim()}"`;
            
            // Transmit data to Make.com only when explicitly stopped
            fetch(MAKE_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ speech: finalTranscript.trim() })
            })
            .then(res => {
                if(res.ok) statusText.innerText = "Entry logged successfully.";
                else statusText.innerText = "Transmission failed.";
            })
            .catch(err => statusText.innerText = "Error contacting Jarvis core.");
        };
    </script>
