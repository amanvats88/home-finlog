<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Interface</title>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #mic-btn {
            background: radial-gradient(circle, #1f2937 0%, #111827 100%);
            border: 2px solid #58a6ff;
            border-radius: 50%;
            width: 150px;
            height: 150px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.2);
            transition: all 0.3s ease;
            font-size: 16px;
            color: #58a6ff;
            font-weight: bold;
        }
        #mic-btn.listening {
            border-color: #ff7b72;
            color: #ff7b72;
            box-shadow: 0 0 30px rgba(255, 123, 114, 0.6);
            animation: pulse 1.5s infinite;
        }
        #status { margin-top: 20px; font-size: 18px; text-align: center; max-width: 80%; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <button id="mic-btn" onclick="toggleListening()">TAP TO SPEAK</button>
    <div id="status">Ready, sir.</div>

    <script>
        // PASTE YOUR MAKE.COM WEBHOOK URL HERE
        // const WEBHOOK_URL = "https://hook.eu1.make.com/y4h1w2x2qan01vtuh32udd6ekp8eg7ro";
        const WEBHOOK_URL = "https://eooooszfzs19sn2.m.pipedream.net";
        let recognition;
        let finalTranscript = "";
        let isListening = false;

        const micBtn = document.getElementById("micBtn");
        const sendBtn = document.getElementById("sendBtn");
        const statusText = document.getElementById("status");

        // 1. Initialize Web Speech API
        if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          recognition = new SpeechRecognition();
          recognition.continuous = true;       // Keep listening through pauses
          recognition.interimResults = true;    // Show live text while speaking

          recognition.onresult = (event) => {
            let interimTranscript = "";
            for (let i = event.resultIndex; i < event.results.length; ++i) {
              if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript + " ";
              } else {
                interimTranscript += event.results[i][0].transcript;
              }
            }
            // Update display box with full text so user can see it before sending
            document.getElementById("transcriptDisplay").innerText = finalTranscript + interimTranscript;
          };

          recognition.onend = () => {
            // DO NOT SEND HERE! Just update status or restart if user hasn't explicitly stopped it
            if (isListening) {
              recognition.start(); // Auto-restart if browser cuts off due to silence
            }
          };
        }

        // 2. Tap to Start/Stop Recording
        micBtn.addEventListener("click", () => {
          if (!isListening) {
            finalTranscript = ""; // Reset
            recognition.start();
            isListening = true;
            statusText.innerText = "Listening... Tap mic when done.";
          } else {
            recognition.stop();
            isListening = false;
            statusText.innerText = "Recording paused. Review text and tap Send.";
          }
        });

        // 3. EXPLICIT TAP TO SEND (Only fires when user taps this button)
        sendBtn.addEventListener("click", async () => {
          if (!finalTranscript.trim()) {
            alert("No speech captured yet!");
            return;
          }
        
          statusText.innerText = "Sending to sheet...";
          
          // Explicitly send payload to Pipedream webhook URL
          try {
            const response = await fetch("YOUR_PIPEDREAM_WEBHOOK_URL", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ speech: finalTranscript.trim() }),
            });

            if (response.ok) {
              statusText.innerText = "Successfully logged!";
              finalTranscript = "";
              document.getElementById("transcriptDisplay").innerText = "";
            } else {
              statusText.innerText = "Failed to send.";
            }
          } catch (err) {
            statusText.innerText = "Network error: " + err.message;
          }
        });
    </script>
</body>
</html>
