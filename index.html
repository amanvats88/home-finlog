<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Expense Tracker</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #3b82f6;
      --accent-active: #ef4444;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background-color: var(--card);
      width: 100%;
      max-width: 420px;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    h2 {
      font-size: 1.25rem;
      text-align: center;
      color: var(--text);
      font-weight: 600;
    }

    .mic-container {
      display: flex;
      justify-content: center;
      margin: 10px 0;
    }

    .mic-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: none;
      background-color: var(--accent);
      color: white;
      font-size: 2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
    }

    .mic-btn.recording {
      background-color: var(--accent-active);
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.6);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .status-badge {
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-muted);
      min-height: 20px;
    }

    .status-badge.active {
      color: var(--accent);
      font-weight: 500;
    }

    .status-badge.success {
      color: var(--success);
      font-weight: 600;
    }

    textarea {
      width: 100%;
      height: 120px;
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: var(--text);
      padding: 12px;
      font-size: 1rem;
      resize: none;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-clear {
      background-color: #334155;
      color: var(--text);
    }

    .btn-send {
      background-color: var(--accent);
      color: white;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Voice Expense Tracker</h2>

    <div class="mic-container">
      <button id="micBtn" class="mic-btn" aria-label="Toggle Recording">🎙️</button>
    </div>

    <div id="status" class="status-badge">Tap mic to start recording</div>

    <textarea id="transcriptInput" placeholder="Captured voice text will appear here... You can also edit manually."></textarea>

    <div class="actions">
      <button id="clearBtn" class="btn btn-clear">Clear</button>
      <button id="sendBtn" class="btn btn-send">Send to Sheet</button>
    </div>
  </div>

  <script>
    // === CONFIGURATION ===
    // Paste your Pipedream HTTP Trigger Webhook URL here
    const WEBHOOK_URL = "https://eooooszfzs19sn2.m.pipedream.net";

    // === DOM ELEMENTS ===
    const micBtn = document.getElementById("micBtn");
    const statusText = document.getElementById("status");
    const transcriptInput = document.getElementById("transcriptInput");
    const clearBtn = document.getElementById("clearBtn");
    const sendBtn = document.getElementById("sendBtn");

    let recognition = null;
    let isRecording = false;
    let finalTranscript = "";

    // === SPEECH RECOGNITION SETUP ===
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      statusText.innerText = "Web Speech API not supported in this browser.";
      micBtn.disabled = true;
    } else {
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = "en-IN"; // Set to your primary dialect (e.g., en-US, en-IN)

      et baseText = ""; // Holds finalized sentences

      recognition.onresult = (event) => {
        let currentSessionText = "";

        // Simply grab the latest result transcript for this speech segment
        for (let i = 0; i < event.results.length; ++i) {
          currentSessionText += event.results[i][0].transcript;
        }

        // Display base previous text + current active utterance
        transcriptInput.value = (baseText + " " + currentSessionText).trim().replace(/\s+/g, " ");
      };

      recognition.onend = () => {
        // Commit current value as the new baseline
        baseText = transcriptInput.value.trim();

        // If user hasn't explicitly tapped pause, immediately restart listening for next phrase
        if (isRecording) {
          try {
            recognition.start();
          } catch (e) {
            console.log("Auto-restart suppressed:", e);
          }
        }
      };

      recognition.onerror = (event) => {
        console.error("Speech recognition error:", event.error);
        if (event.error === "not-allowed") {
          statusText.innerText = "Microphone access denied.";
          stopRecordingState();
        }
      };
    }

    // === MIC BUTTON CLICK HANDLER ===
    micBtn.addEventListener("click", () => {
      if (!isRecording) {
        startRecordingState();
      } else {
        stopRecordingState();
      }
    });

    function startRecordingState() {
      isRecording = true;
      baseText = transcriptInput.value.trim();
  
      try {
        recognition.start();
        micBtn.classList.add("recording");
        statusText.className = "status-badge active";
        statusText.innerText = "Listening... Tap mic again to pause.";
      } catch (err) {
        console.error("Start error:", err);
      }
    }

    function stopRecordingState() {
      isRecording = false;
      micBtn.classList.remove("recording");
      statusText.className = "status-badge";
      statusText.innerText = "Recording paused. Review and tap Send.";
      if (recognition) recognition.stop();
    }

    // Update Clear button to clear baseText too
    clearBtn.addEventListener("click", () => {
      baseText = "";
      finalTranscript = "";
      transcriptInput.value = "";
      if (!isRecording) {
        statusText.innerText = "Tap mic to start recording";
      }
    });

    // === CLEAR BUTTON ===
    clearBtn.addEventListener("click", () => {
      finalTranscript = "";
      transcriptInput.value = "";
      if (!isRecording) {
        statusText.innerText = "Tap mic to start recording";
      }
    });

    // === SEND BUTTON (EXPLICIT TRIGGER) ===
    sendBtn.addEventListener("click", async () => {
      const textToSend = transcriptInput.value.trim();

      if (!textToSend) {
        statusText.innerText = "Please record or type something first!";
        return;
      }

      // Stop recording if active before sending
      if (isRecording) {
        stopRecordingState();
      }

      sendBtn.disabled = true;
      statusText.className = "status-badge active";
      statusText.innerText = "Sending to Pipedream...";

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ speech: textToSend }),
        });

        if (response.ok) {
          statusText.className = "status-badge success";
          statusText.innerText = "✓ Sent successfully!";
          // Reset UI
          finalTranscript = "";
          transcriptInput.value = "";
        } else {
          statusText.className = "status-badge";
          statusText.innerText = `Server error: ${response.status}`;
        }
      } catch (err) {
        statusText.className = "status-badge";
        statusText.innerText = "Network error. Check connection.";
        console.error(err);
      } finally {
        sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
